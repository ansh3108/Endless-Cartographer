<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start">CLICK TO BEGIN EXPLORATION</div>
    <canvas id="c"></canvas>
    <canvas id="mini" width="200" height="200"></canvas>
    
    <div id="toolbar">
        <button id="btn-pin" title="Place Pin (P)">Pin</button>
        <button id="btn-draw" title="Draw Path (L)">Draw</button>
        <button id="btn-export" title="Export Map">Export</button>
        <button id="btn-clear" title="Clear Marks">Clear</button>
    </div>

    <div id="journal">
        <h3>CARTOGRAPHER'S JOURNAL</h3>
        <ul id="j-list"></ul>
        <div class="hint">Press [J] to toggle</div>
    </div>
    <script src="main.js"></script>
</body>
</html>
